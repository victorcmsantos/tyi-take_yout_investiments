services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: invest-portal-backend
    container_name: backend
    networks:
      - invest-net
    environment:
      ALPHA_VANTAGE_API_KEY: "${ALPHA_VANTAGE_API_KEY:-}"
      BRAPI_TOKEN: "${BRAPI_TOKEN:-}"
      BRAPI_QUOTE_CACHE_TTL_SECONDS: "${BRAPI_QUOTE_CACHE_TTL_SECONDS:-120}"
      BRAPI_RATE_LIMIT_COOLDOWN_SECONDS: "${BRAPI_RATE_LIMIT_COOLDOWN_SECONDS:-300}"
      COINGECKO_API_KEY: "${COINGECKO_API_KEY:-}"
      COINGECKO_RATE_LIMIT_COOLDOWN_SECONDS: "${COINGECKO_RATE_LIMIT_COOLDOWN_SECONDS:-900}"
      TWELVE_DATA_API_KEY: "${TWELVE_DATA_API_KEY:-}"
      DATABASE: "/app_vol/investments.db"
      DATABASE_BACKUP_DIR: "/app_vol/backups"
      AUTH_SECRET_KEY_FILE: "/app_vol/.flask-secret"
      ADMIN_BOOTSTRAP_FILE: "/app_vol/admin-bootstrap.txt"
      BACKGROUND_JOBS_LOCK_FILE: "/app_vol/.background-jobs.lock"
      DATABASE_STARTUP_LOCK_FILE: "/app_vol/.db-startup.lock"
      MARKET_DATA_LOG_SOURCES: "1"
      MARKET_DATA_PROVIDERS: "${MARKET_DATA_PROVIDERS:-twelve_data,alpha_vantage,brapi,coingecko,google,yahoo}"
      MARKET_DATA_PROVIDERS_US: "${MARKET_DATA_PROVIDERS_US:-}"
      MARKET_DATA_PROVIDERS_CRYPTO: "${MARKET_DATA_PROVIDERS_CRYPTO:-yahoo,coingecko}"
      MARKET_DATA_PROVIDERS_BR: "${MARKET_DATA_PROVIDERS_BR:-market_scanner}"
      MARKET_DATA_USE_SCANNER_BR: "${MARKET_DATA_USE_SCANNER_BR:-1}"
      MARKET_DATA_STALE_AFTER_SECONDS_CRYPTO: "${MARKET_DATA_STALE_AFTER_SECONDS_CRYPTO:-300}"
      MARKET_SCANNER_DATA_TTL_SECONDS: "${MARKET_SCANNER_DATA_TTL_SECONDS:-120}"
      MARKET_SYNC_ENABLED: "${MARKET_SYNC_ENABLED:-1}"
      MARKET_SYNC_INTERVAL_SECONDS: "${MARKET_SYNC_INTERVAL_SECONDS:-300}"
      UPCOMING_INCOME_SYNC_ENABLED: "${UPCOMING_INCOME_SYNC_ENABLED:-1}"
      UPCOMING_INCOME_SYNC_INTERVAL_SECONDS: "${UPCOMING_INCOME_SYNC_INTERVAL_SECONDS:-1800}"
      UPCOMING_INCOME_SYNC_WARMUP_ON_STARTUP: "${UPCOMING_INCOME_SYNC_WARMUP_ON_STARTUP:-1}"
      UPCOMING_INCOME_SYNC_MAX_ITEMS_PER_TICKER: "${UPCOMING_INCOME_SYNC_MAX_ITEMS_PER_TICKER:-8}"
      UPCOMING_INCOME_SYNC_MAX_TICKERS_PER_RUN: "${UPCOMING_INCOME_SYNC_MAX_TICKERS_PER_RUN:-0}"
      UPCOMING_INCOME_HISTORY_ESTIMATE_ENABLED: "${UPCOMING_INCOME_HISTORY_ESTIMATE_ENABLED:-1}"
      MARKET_SCANNER_BASE_URL: "${MARKET_SCANNER_BASE_URL:-http://market-scanner:8000}"
      MARKET_SCANNER_TIMEOUT_SECONDS: "${MARKET_SCANNER_TIMEOUT_SECONDS:-8}"
      MARKET_SCANNER_DATABASE_PATH: "${MARKET_SCANNER_DATABASE_PATH:-/app_vol/investments.db}"
      OPENCLAW_GATEWAY_URL: "${OPENCLAW_GATEWAY_URL:-https://openclaw-gateway:18789}"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:-}"
      OPENCLAW_TLS_CA_BUNDLE: "/openclaw-config/gateway/tls/openclaw-local-ca.pem"
      TELEGRAM_ENABLED: "${TELEGRAM_ENABLED:-0}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      TELEGRAM_THREAD_ID: "${TELEGRAM_THREAD_ID:-0}"
      TELEGRAM_MESSAGE_PREFIX: "${TELEGRAM_MESSAGE_PREFIX:-TYI}"
      TELEGRAM_TIMEOUT_SECONDS: "${TELEGRAM_TIMEOUT_SECONDS:-8}"
      TELEGRAM_DEFAULT_MIN_INTERVAL_SECONDS: "${TELEGRAM_DEFAULT_MIN_INTERVAL_SECONDS:-120}"
      TELEGRAM_NOTIFY_PROFILE: "${TELEGRAM_NOTIFY_PROFILE:-prod}"
      TELEGRAM_NOTIFY_EVENTS: "${TELEGRAM_NOTIFY_EVENTS:-}"
    ports:
      - "8001:8000"
    volumes:
      - /srv/tyi-take_yout_investiments/app_vol:/app_vol
      - ${OPENCLAW_CONFIG_DIR:-/srv/tyi-take_yout_investiments/openclaw/config}:/openclaw-config:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_OPENCLAW_ENRICHMENT_STALE_DAYS: "${VITE_OPENCLAW_ENRICHMENT_STALE_DAYS:-3}"
    image: invest-portal-frontend
    container_name: frontend
    networks:
      - invest-net
    ports:
      - "8000:80"
    depends_on:
      - backend

  market-scanner:
    profiles: ["scanner"]
    build:
      context: ./market-scanner
      dockerfile: Dockerfile
    image: market-scanner
    networks:
      - invest-net
    environment:
      BRAPI_TOKEN: "${BRAPI_TOKEN:-}"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      LOG_LEVEL: "${MARKET_SCANNER_LOG_LEVEL:-INFO}"
      DATABASE_URL: "${MARKET_SCANNER_DATABASE_URL:-sqlite:////app_vol/investments.db}"
      START_SCHEDULER_WITH_API: "${MARKET_SCANNER_START_SCHEDULER_WITH_API:-1}"
      IMMEDIATE_SCAN_ON_STARTUP: "${MARKET_SCANNER_IMMEDIATE_SCAN_ON_STARTUP:-1}"
    command: ["python", "main.py", "--mode", "all", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${MARKET_SCANNER_HOST_IP:-0.0.0.0}:${MARKET_SCANNER_PORT:-8089}:8000"
    volumes:
      - ${MARKET_SCANNER_DATA_DIR:-/srv/tyi-take_yout_investiments/market-scanner/data}:/app/data
      - /srv/tyi-take_yout_investiments/app_vol:/app_vol
    restart: unless-stopped

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    networks:
      - invest-net
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      NODE_EXTRA_CA_CERTS: /home/node/.openclaw/gateway/tls/openclaw-local-ca.pem
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/srv/tyi-take_yout_investiments/openclaw/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-/srv/tyi-take_yout_investiments/openclaw/workspace}:/home/node/.openclaw/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_HOST_IP:-0.0.0.0}:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_GATEWAY_HOST_IP:-0.0.0.0}:${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "--cacert",
          "/home/node/.openclaw/gateway/tls/openclaw-local-ca.pem",
          "https://openclaw-gateway:18789/healthz"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    profiles: ["cli"]
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      NODE_EXTRA_CA_CERTS: /home/node/.openclaw/gateway/tls/openclaw-local-ca.pem
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-/srv/tyi-take_yout_investiments/openclaw/config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-/srv/tyi-take_yout_investiments/openclaw/workspace}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

networks:
  invest-net:
